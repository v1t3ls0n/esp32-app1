# One-click-ish deploy to Render (https://render.com) — free tier works.
# After deploy, set VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY / DEVICE_TOKEN in the
# Render dashboard (Environment tab). Generate the VAPID keys locally with
# `cd server && npm install && npm run gen-keys`.
services:
  - type: web
    name: esp32-relay
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:you@example.com
      - key: DEVICE_TOKEN
        sync: false
